# NUCLEO-C562RE OpenOCD configuration - STM32C562RE
# Uses stlink-dap (dapdirect_swd) to bypass HLA TrustZone limitation.
# Invoke as:
#   openocd -f interface/stlink-dap.cfg -c "transport select dapdirect_swd" \
#           -c "set CPUTAPID 0x6ba02477" -f target/stm32u5x.cfg \
#           -c "program main.elf verify reset exit"
